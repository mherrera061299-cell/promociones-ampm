<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promociones AMPM</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0}
header{background:#0a7d5a;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
input,button{padding:10px;margin:5px;width:100%;box-sizing:border-box}
button{background:#0a7d5a;color:#fff;border:0;border-radius:5px}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{border:1px solid #ddd;padding:8px}
.hidden{display:none}
</style>
</head>
<body>
<header><h2>Promociones AMPM</h2></header>
<div class="container" id="login">
<h3>Iniciar sesión</h3>
<input id="u" placeholder="Usuario">
<input id="p" type="password" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
</div>
<div class="container hidden" id="app">
<h3>Nueva promoción</h3>
<input id="nombre" placeholder="Nombre de la promoción">
<input id="precio" placeholder="Precio">
<button onclick="agregar()">Guardar</button>
<table>
<thead><tr><th>Promoción</th><th>Precio</th></tr></thead>
<tbody id="lista"></tbody>
</table>
</div>
<script>
if(localStorage.promos){render();}
function login(){
 if(u.value==="admin"&&p.value==="ampm123"){
  login.classList.add("hidden");app.classList.remove("hidden");render();
 }else alert("Usuario o contraseña incorrectos");
}
function agregar(){
 let arr=JSON.parse(localStorage.promos||"[]");
 arr.push({n:nombre.value,p:precio.value});
 localStorage.promos=JSON.stringify(arr);
 nombre.value="";precio.value="";render();
}
function render(){
 let arr=JSON.parse(localStorage.promos||"[]");
 let t=document.getElementById("lista");t.innerHTML="";
 arr.forEach(x=>t.innerHTML+=`<tr><td>${x.n}</td><td>${x.p}</td></tr>`);
}
</script>
</body></html>
